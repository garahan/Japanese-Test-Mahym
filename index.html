<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1c2e">
<link rel="prefetch" href="/roadmap.html">
<title>🌸 Mahym's Japanese</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede8;--card:#ffffff;--ink:#1c1c2e;--ink2:#52526e;--ink3:#9898b0;
  --red:#ff4b4b;--red-soft:#ffeeee;--green:#00c853;--green-soft:#eafaf1;
  --blue:#2979ff;--blue-soft:#eff4ff;--gold:#ffb300;--gold-soft:#fff8e1;
  --purple:#8e24aa;--purple-soft:#f3e5f5;--border:#e4e0d8;
  --shadow:0 4px 12px rgba(28,28,46,.06),0 1px 3px rgba(28,28,46,.04);
  --r:20px;--spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;overflow-x:hidden}
/* Long-press to SELECT Japanese → iOS shows the blue highlight + Look Up / Translate.
   Selection is ON by default; we only turn it OFF on tappable chrome (buttons, tiles, nav). */
button,.tile,.lesson-card,.opt,.rate,.m-cta,.next-btn,.reveal-btn,.shead,.fc-scene,.hero,.diff-badge,.seg,.seg-btn,.lcta,.bottom-nav{-webkit-user-select:none;user-select:none}
.passage,.recall-ex,.recall-eglist,.recall-cue,.recall-main,.recall-reading,.teach .ex,.teach li,.teach .big,.teach .read,.q-sentence,.vocab-jp,.vocab-ex,.gram-ex,.gram-card,.lesson-about,.lookup{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;cursor:text}
::selection{background:#bbdefb;color:#1c1c2e}
.view{display:none;animation:fadeIn .3s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:translateY(16px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shake{10%,90%{transform:translate3d(-2px,0,0)}20%,80%{transform:translate3d(4px,0,0)}30%,50%,70%{transform:translate3d(-8px,0,0)}40%,60%{transform:translate3d(8px,0,0)}}

/* ── FUTURE-SELF HEADER ── */
.hero{background:var(--ink);color:#fff;padding:2.4rem 1.25rem 2rem;border-radius:0 0 30px 30px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::after{content:'道';position:absolute;right:-14px;top:-26px;font-size:170px;font-family:'Noto Sans JP';font-weight:900;color:rgba(255,255,255,.04);line-height:1;pointer-events:none}
.hero-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:700;margin-bottom:10px}
.identity{display:flex;align-items:center;gap:10px;font-weight:800}
.id-now{font-size:20px;color:#fff}
.id-arrow{color:var(--gold);font-size:18px}
.id-future{font-size:15px;color:rgba(255,255,255,.55)}
.hero-mastery{display:flex;align-items:flex-end;gap:14px;margin-top:18px}
.hm-num{font-size:54px;font-weight:900;letter-spacing:-.03em;line-height:.9}
.hm-side{padding-bottom:6px}
.hm-label{font-size:12px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.hm-growth{font-size:13px;font-weight:800;color:#69f0ae;margin-top:2px}
.momentum{display:inline-flex;align-items:center;gap:6px;background:rgba(255,179,0,.15);border:1px solid rgba(255,179,0,.3);border-radius:24px;padding:5px 13px;font-size:13px;font-weight:800;color:#ffca28;margin-top:16px}
.momentum.hot{animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,179,0,.4)}70%{box-shadow:0 0 0 9px rgba(255,179,0,0)}100%{box-shadow:0 0 0 0 rgba(255,179,0,0)}}

.body{max-width:640px;margin:0 auto;padding:1.4rem 1rem 5rem}
.sect{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin:1.5rem 0 .7rem;padding-left:4px}

/* ── MISSION (story-ring) ── */
.mission-ring{position:relative;padding:4px;border-radius:24px;background:linear-gradient(45deg,#ffb300,#ff4b4b,#8e24aa,#2979ff);background-size:300% 300%;animation:spin 4s ease infinite;box-shadow:0 8px 24px rgba(255,75,75,.22);transition:transform .2s var(--spring)}
.mission-ring:active{transform:scale(.97)}
.mission-ring.done{background:var(--border);animation:none;box-shadow:none;opacity:.85}
@keyframes spin{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.mission{background:var(--ink);border-radius:20px;padding:1.6rem 1.4rem;cursor:pointer;position:relative;overflow:hidden}
.mission::before{content:'今日';position:absolute;right:-10px;top:-12px;font-family:'Noto Sans JP';font-size:96px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none}
.mission-ring.done .mission{background:var(--card);border:1px solid var(--border)}
.m-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.mission-ring.done .m-label{color:var(--green)}
.m-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:5px;letter-spacing:-.01em}
.mission-ring.done .m-title{color:var(--ink)}
.m-sub{font-size:13.5px;color:rgba(255,255,255,.6);margin-bottom:1.1rem}
.mission-ring.done .m-sub{color:var(--ink3)}
.m-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.3rem}
.m-pill{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:800}
.m-pill.focus{background:rgba(255,179,0,.2);color:#ffe082}
.m-pill.b{background:rgba(41,121,255,.2);color:#bbdefb}
.m-cta{background:#fff;color:var(--ink);border:none;border-radius:14px;padding:12px 24px;font-size:15px;font-weight:900;cursor:pointer;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* ── STORY CARD ── */
.story-card{background:linear-gradient(135deg,#1d3a8a,#2979ff);color:#fff;border-radius:var(--r);padding:1.3rem 1.4rem;margin-top:1rem;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s var(--spring)}
.story-card:active{transform:scale(.97)}
.story-card::after{content:'本';position:absolute;right:-8px;bottom:-22px;font-family:'Noto Sans JP';font-size:96px;font-weight:900;color:rgba(255,255,255,.08)}
.story-eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.story-title{font-size:19px;font-weight:800;font-family:'Noto Sans JP';margin-bottom:8px}
.story-meta{font-size:12.5px;color:rgba(255,255,255,.75);font-weight:600}

/* ── MASTERY PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow)}
.dim-row{margin-bottom:15px}.dim-row:last-child{margin-bottom:0}
.dim-top{display:flex;justify-content:space-between;font-weight:800;font-size:14px;margin-bottom:5px}
.track{height:9px;background:var(--bg);border-radius:5px;overflow:hidden}
.fill{height:100%;border-radius:5px;transition:width 1s var(--spring)}
.retention-note{font-size:12px;color:var(--ink3);margin-top:12px;text-align:center;font-weight:600}

/* ── PRACTICE GRID ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem 1rem;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:transform .2s var(--spring)}
.tile:active{transform:scale(.93)}
.tile.wide{grid-column:1/-1;display:flex;align-items:center;gap:1.1rem;text-align:left}
.t-icon{font-size:28px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}
.t-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.t-sub{font-size:12px;color:var(--ink3);font-weight:600}

/* ── SESSION HEADER ── */
.shead{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:1rem 1.2rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.sback{background:#f0ede8;border:none;cursor:pointer;font-size:16px;color:var(--ink2);width:36px;height:36px;border-radius:18px;font-weight:700}
.sbar-wrap{flex:1}.sbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s var(--spring)}
.s-meta{font-size:14px;font-weight:800;color:var(--ink2);min-width:46px;text-align:right}

/* ── QUIZ / CARDS ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.7rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.q-sentence{font-family:'Noto Sans JP';font-size:20px;font-weight:500;line-height:1.6;margin-bottom:8px}
.q-ask{font-size:13.5px;color:var(--ink2);font-weight:700;margin-bottom:18px}
.opts{display:grid;gap:10px}
.opt{padding:15px 18px;border:2px solid var(--border);border-radius:16px;background:var(--card);color:var(--ink);font-size:16px;font-weight:700;font-family:'Noto Sans JP';cursor:pointer;text-align:left;transition:transform .15s var(--spring)}
.opt:active:not(:disabled){transform:scale(.96);background:var(--bg)}
.opt.correct{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{background:var(--red);border-color:var(--red);color:#fff;animation:shake .4s both}
.opt.sel{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.feedback{margin-top:14px;font-size:13.5px;font-weight:600;padding:12px 15px;border-radius:12px;line-height:1.5;animation:fadeIn .3s}
.feedback.ok{background:var(--green-soft);color:#008738}
.feedback.err{background:var(--red-soft);color:#d32f2f}
.next-btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:900;cursor:pointer;margin-top:14px;display:none}
.next-btn.show{display:block;animation:popIn .35s var(--spring)}

/* teaching cards */
.teach{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.7rem;box-shadow:var(--shadow);text-align:center}
.teach .big{font-family:'Noto Sans JP';font-size:44px;font-weight:900;margin-bottom:6px}
.teach .read{font-size:18px;color:var(--ink2);font-weight:700;margin-bottom:4px}
.teach .mean{font-size:18px;color:var(--blue);font-weight:800;margin-bottom:14px}
.teach .ex{font-family:'Noto Sans JP';font-size:16px;background:var(--bg);border-radius:12px;padding:12px 14px;line-height:1.6;text-align:left}
.teach .exm{font-size:13px;color:var(--ink3);margin-top:6px;text-align:left}
.teach ul{text-align:left;margin:10px 0 0;padding-left:1.1rem}
.teach li{font-family:'Noto Sans JP';font-size:15px;line-height:1.7;margin-bottom:4px}
.listen-btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue-soft);color:var(--blue);border:none;border-radius:24px;padding:9px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-top:14px}
.listen-btn:active{transform:scale(.94)}

/* flashcards */
.fc-scene{perspective:1000px;margin-bottom:1.4rem;cursor:pointer}
.fc-inner{position:relative;width:100%;min-height:300px;transition:transform .6s var(--spring);transform-style:preserve-3d}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;background:var(--card);border:2px solid var(--border);border-radius:24px;padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;box-shadow:var(--shadow);text-align:center}
.fc-back{transform:rotateY(180deg)}
.fc-big{font-family:'Noto Sans JP';font-size:46px;font-weight:900;margin-bottom:12px}
.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;animation:popIn .3s}
.rate{padding:13px 6px;border:none;border-radius:14px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.1)}
.rate:active{transform:translateY(4px);box-shadow:0 0 0 rgba(0,0,0,0)}
.r1{background:#ffcdd2;color:#c62828}.r2{background:#ffe0b2;color:#ef6c00}.r3{background:#c8e6c9;color:#2e7d32}.r4{background:#bbdefb;color:#1565c0}

/* production recall (mission recall step) */
.recall-eyebrow{text-align:center;font-size:12px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.recall-cuelabel{font-size:12px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:10px}
.recall-cue{font-family:'Noto Sans JP';font-size:30px;font-weight:900;text-align:center;line-height:1.4;margin-bottom:6px}
.recall-answer{border-top:1px dashed var(--border);margin-top:18px;padding-top:18px;text-align:center;animation:popIn .3s var(--spring)}
.recall-main{font-family:'Noto Sans JP';font-size:42px;font-weight:900;margin-bottom:4px}
.recall-reading{font-size:18px;color:var(--ink2);font-weight:700;line-height:1.6}
.recall-ex{font-family:'Noto Sans JP';font-size:16px;background:var(--bg);border-radius:12px;padding:12px 14px;line-height:1.6;text-align:left;margin-top:12px}
.recall-exm{font-size:13px;color:var(--ink3);margin-top:6px;text-align:left}
.recall-eglist{text-align:left;margin:6px 0 0;padding-left:1.1rem}
.recall-eglist li{font-family:'Noto Sans JP';font-size:15px;line-height:1.7;margin-bottom:4px}
.reveal-btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:900;cursor:pointer;margin-top:18px}
.reveal-btn:active{transform:scale(.97)}
.fc-cue{font-family:'Noto Sans JP';font-size:30px;font-weight:900;color:var(--ink);line-height:1.4}
.fc-grammar-back{font-size:16px;color:var(--ink2);font-weight:700;line-height:1.6;text-align:center}

/* reading center */
.passage{font-family:'Noto Sans JP';font-size:19px;line-height:2;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem;box-shadow:var(--shadow);margin-bottom:1rem}
.read-tools{display:flex;gap:10px;margin-bottom:1rem}
.read-tools button{flex:1;padding:13px;border:none;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer}
.rt-listen{background:var(--blue);color:#fff}.rt-start{background:var(--ink);color:#fff}

.particle{position:absolute;font-weight:900;font-size:24px;pointer-events:none;z-index:100;animation:floatUp .8s var(--spring) forwards;text-shadow:0 2px 8px rgba(0,0,0,.15)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.5)}50%{transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-52px) scale(1)}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999}
.admin-link{text-align:center;padding:40px 0 30px}
.admin-link a{text-decoration:none;font-size:14px;opacity:.2;color:var(--ink2);transition:opacity .3s}

/* ===================== LESSON CURRICULUM UI ===================== */
/* difficulty badges (easy / medium / hard) — used on lesson cards AND on each question */
.diff-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.diff-easy{background:var(--green-soft);color:#1b8a4b}
.diff-medium{background:var(--gold-soft);color:#b26a00}
.diff-hard{background:var(--red-soft);color:#d32f2f}
.diff-dot{width:7px;height:7px;border-radius:50%}
.diff-easy .diff-dot{background:#1b8a4b}.diff-medium .diff-dot{background:#e69500}.diff-hard .diff-dot{background:#e53935}

/* progress strip in the home hero */
.prog-strip{display:flex;gap:10px;margin-top:18px}
.prog-stat{flex:1;background:rgba(255,255,255,.08);border-radius:14px;padding:11px 12px}
.ps-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.ps-label{font-size:10.5px;color:rgba(255,255,255,.55);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* continue card */
.continue-card{background:linear-gradient(135deg,#1d3a8a,#2979ff);color:#fff;border-radius:var(--r);padding:1.3rem 1.4rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s var(--spring);position:relative;overflow:hidden}
.continue-card:active{transform:scale(.98)}
.continue-card::after{content:'続';position:absolute;right:-6px;bottom:-20px;font-family:'Noto Sans JP';font-size:88px;font-weight:900;color:rgba(255,255,255,.1)}
.cc-eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.cc-title{font-size:20px;font-weight:900;font-family:'Noto Sans JP';margin-bottom:4px}
.cc-sub{font-size:12.5px;color:rgba(255,255,255,.8);font-weight:600}

/* lesson list */
.lesson-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s var(--spring)}
.lesson-card:active{transform:scale(.98)}
.lesson-card.locked{opacity:.62}
.lc-num{flex-shrink:0;width:46px;height:46px;border-radius:14px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}
.lc-num .n{font-size:18px;line-height:1}.lc-num .l{font-size:9px;color:var(--ink3);font-weight:800}
.lc-body{flex:1;min-width:0}
.lc-topic{font-family:'Noto Sans JP';font-size:16px;font-weight:800;margin-bottom:2px}
.lc-en{font-size:12.5px;color:var(--ink3);font-weight:600;margin-bottom:7px}
.lc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lc-prog{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;flex:1;min-width:60px}
.lc-prog .f{height:100%;background:var(--green);border-radius:3px;transition:width .6s var(--spring)}
.lc-check{color:var(--green);font-weight:900;font-size:16px}
.lc-lock{font-size:15px;opacity:.6}

/* lesson detail */
.lesson-head{background:var(--ink);color:#fff;padding:1.6rem 1.25rem 1.4rem;border-radius:0 0 26px 26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.lesson-head::after{content:attr(data-kanji);position:absolute;right:-10px;top:-30px;font-size:150px;font-family:'Noto Sans JP';font-weight:900;color:rgba(255,255,255,.05);line-height:1;pointer-events:none}
.lh-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.lh-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:18px;font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0}
.lh-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.lh-topic{font-family:'Noto Sans JP';font-size:26px;font-weight:900;margin:4px 0 2px}
.lh-en{font-size:14px;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:14px}
.lh-steps{display:flex;gap:6px}
.lh-step{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.15)}
.lh-step.done{background:#69f0ae}

.seg{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin:0 0 1.2rem}
.seg-btn{flex:1;border:none;background:transparent;padding:10px;border-radius:11px;font-weight:800;font-size:14px;color:var(--ink2);cursor:pointer}
.seg-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

.lesson-about{background:var(--blue-soft);border:1px solid #d6e4ff;border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1rem;line-height:1.6;font-size:14.5px}
.lesson-about h4{font-size:13px;font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

.learn-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.lb-h{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:12px}
.vocab-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--border)}
.vocab-row:first-of-type{border-top:none}
.vocab-jp{font-family:'Noto Sans JP';font-size:19px;font-weight:800}
.vocab-rd{font-size:13px;color:var(--ink3);font-weight:600}
.vocab-mn{font-size:13.5px;color:var(--blue);font-weight:700}
.vocab-ex{font-family:'Noto Sans JP';font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.5}
.mini-listen{flex-shrink:0;background:var(--blue-soft);color:var(--blue);border:none;width:38px;height:38px;border-radius:12px;font-size:15px;cursor:pointer}
.gram-card{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.gram-card:first-of-type{border-top:none;padding-top:0;margin-top:0}
.gram-point{font-family:'Noto Sans JP';font-size:18px;font-weight:900;margin-bottom:6px}
.gram-exp{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:10px}
.gram-ex{font-family:'Noto Sans JP';font-size:14.5px;background:var(--bg);border-radius:10px;padding:9px 12px;margin-bottom:6px;line-height:1.55}
.furi{display:block;font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:1px}

/* practice category list */
.prac-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s var(--spring)}
.prac-card:active{transform:scale(.98)}
.prac-icon{font-size:24px;flex-shrink:0}
.prac-body{flex:1}
.prac-name{font-size:15.5px;font-weight:800;margin-bottom:2px}
.prac-sub{font-size:12px;color:var(--ink3);font-weight:600}
.prac-arrow{color:var(--ink3);font-size:20px;font-weight:800}
.lcta{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:900;cursor:pointer;margin:.5rem 0 1rem;box-shadow:0 4px 0 #00a344}
.lcta:active{transform:translateY(3px);box-shadow:0 1px 0 #00a344}
.lcta.ghost{background:var(--card);color:var(--ink2);box-shadow:0 4px 0 var(--border);border:1px solid var(--border)}

/* difficulty badge floated on a quiz/recall card */
.q-diff{position:absolute;top:12px;right:12px}
.q-card,.recall-answer{position:relative}
.lookup-hint{font-size:12px;color:var(--ink3);font-weight:600;text-align:center;background:var(--gold-soft);border-radius:12px;padding:8px 12px;margin-bottom:1rem}

/* ===================== JOURNEY MAP (compact 25→50 tracker) ===================== */
.journey{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.1rem 1rem;box-shadow:var(--shadow)}
.j-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.j-now{font-size:14px;font-weight:900}
.j-count{font-size:12.5px;font-weight:800;color:var(--ink3)}
.j-bar{height:9px;background:var(--bg);border-radius:5px;overflow:hidden;margin-bottom:16px}
.j-bar .f{height:100%;background:linear-gradient(90deg,var(--green),#2979ff);border-radius:5px;transition:width .8s var(--spring)}
.j-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.j-sec{margin-bottom:14px}
.j-sec:last-of-type{margin-bottom:0}
.j-sec-h{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;font-weight:800;color:var(--ink3);margin:0 2px 8px;text-transform:uppercase;letter-spacing:.04em}
.j-sec-c{font-size:11px;font-weight:900;color:var(--ink2);background:var(--bg);border-radius:20px;padding:2px 9px}
.j-node{position:relative;aspect-ratio:1/1;border-radius:14px;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);transition:transform .12s var(--spring)}
.j-node:active{transform:scale(.9)}
.j-node.done{background:var(--green);color:#fff;border-color:var(--green)}
.j-node.current{border:2.5px solid var(--blue);color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft);animation:jpulse 2s var(--spring) infinite}
.j-node.locked{background:var(--bg);color:var(--ink3);border-style:dashed;opacity:.65;cursor:default;box-shadow:none}
.j-node .cor{position:absolute;top:2px;right:5px;font-size:10px;font-weight:900}
.j-node .dot{position:absolute;bottom:6px;width:6px;height:6px;border-radius:50%}
@keyframes jpulse{0%,100%{box-shadow:0 0 0 4px var(--blue-soft)}50%{box-shadow:0 0 0 7px var(--blue-soft)}}
.j-legend{display:flex;gap:14px;justify-content:center;margin-top:16px;font-size:11px;color:var(--ink3);font-weight:600;flex-wrap:wrap}
.j-legend span{display:inline-flex;align-items:center;gap:5px}
.j-chip{width:13px;height:13px;border-radius:5px;display:inline-block;flex-shrink:0}
.j-more{font-size:12px;color:var(--blue);text-decoration:none;font-weight:800}

/* ===================== EXAM COUNTDOWN + MOCK EXAM ===================== */
.exam-countdown{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:8px 12px;margin-bottom:14px;cursor:pointer;font-weight:800}
.exam-countdown .ec-days{font-size:18px;color:#ffd84d}
.exam-countdown .ec-label{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:.02em}
.mock-tile{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#3a1d8a,#6c3fd0);border:1px solid #6c3fd0;border-radius:15px;padding:13px 14px;cursor:pointer;box-shadow:var(--shadow);color:#fff}
.mock-tile:active{transform:scale(.98)}
.mock-tile .mt-ico{font-size:22px}
.mock-tile .mt-name{font-size:15px;font-weight:800}
.mock-tile .mt-sub{font-size:12px;color:rgba(255,255,255,.75);font-weight:600}

/* exam hub */
.exam-hub-head{margin:.2rem 0 1rem}
.exam-hub-title{font-size:20px;font-weight:900}
.exam-hub-sub{font-size:13px;color:var(--ink3);margin-top:4px;font-weight:600;line-height:1.5}
.level-card{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;position:relative}
.level-card:active{transform:scale(.99)}
.level-card.locked{opacity:.6;cursor:not-allowed}
.level-card .lv-row{display:flex;align-items:center;gap:12px}
.level-card .lv-badge{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0}
.lv-A .lv-badge{background:#2bb673}.lv-B .lv-badge{background:#e69500}.lv-C .lv-badge{background:#e53935}
.level-card .lv-name{font-size:16px;font-weight:900}
.level-card .lv-jp{font-size:12.5px;color:var(--ink3);font-weight:700;margin-top:2px}
.level-card .lv-meta{margin-left:auto;text-align:right;flex-shrink:0}
.level-card .lv-best{font-size:13px;font-weight:900}
.level-card .lv-status{font-size:11px;font-weight:800;margin-top:2px}
.lv-pass{color:var(--green)}.lv-lock{color:var(--ink3)}
.level-card .lv-secs{font-size:11.5px;color:var(--ink3);font-weight:600;margin-top:10px;line-height:1.5}

/* exam runner top bar */
.exam-top{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:none}
.exam-top.show{display:block}
.exam-top-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.exam-quit{background:none;border:none;font-size:18px;color:var(--ink3);cursor:pointer;padding:2px 6px}
.exam-timer{font-size:16px;font-weight:900;font-variant-numeric:tabular-nums;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px}
.exam-timer.warn{color:#e53935;border-color:#e53935;animation:jpulse 1s infinite}
.exam-section-pill{font-size:12px;font-weight:800;color:var(--blue)}
.exam-prog{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:9px}
.exam-prog .f{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .3s}
/* exam question */
.exam-sec-head{font-size:13px;font-weight:900;color:var(--ink);margin:.3rem 0 .2rem}
.exam-sec-desc{font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:1rem}
.exam-passage{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px;line-height:2;margin-bottom:1rem;white-space:pre-line}
.exam-q{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:1rem}
.exam-next{width:100%;padding:15px;border:none;border-radius:14px;background:var(--ink);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:.5rem}
.exam-next:disabled{opacity:.4;cursor:not-allowed}
/* exam result */
.exam-score-ring{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:1rem auto;color:#fff}
.exam-score-ring .pct{font-size:34px;font-weight:900;line-height:1}
.exam-score-ring .lab{font-size:11px;font-weight:800;opacity:.85;margin-top:3px}
.exam-verdict{text-align:center;font-size:18px;font-weight:900;margin-bottom:.3rem}
.exam-breakdown{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:1rem 0}
.exam-brow{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.exam-brow:last-child{border-bottom:none}
.exam-brow .bn{font-weight:700}.exam-brow .bs{font-weight:900;font-variant-numeric:tabular-nums}
.exam-review-q{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14px;line-height:1.6}
.exam-review-q .erv-bad{color:#e53935;font-weight:700}.exam-review-q .erv-good{color:var(--green);font-weight:700}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- ===================== HOME (LESSONS) ===================== -->
<div class="view active" id="view-dash">
  <div class="hero">
    <div class="exam-countdown" id="exam-countdown" onclick="App.setExamDate()" title="Tap to set the exam date"></div>
    <div class="hero-eyebrow">みんなの日本語 — Minna no Nihongo</div>
    <div class="identity">
      <span class="id-now" id="id-now">Lessons 25 – 50</span>
      <span class="id-arrow">→</span>
      <span class="id-future">N4 Master 👑</span>
    </div>
    <div class="prog-strip">
      <div class="prog-stat"><div class="ps-num" id="ps-done">0</div><div class="ps-label">Lessons done</div></div>
      <div class="prog-stat"><div class="ps-num" id="ps-mastery">0%</div><div class="ps-label">Mastery</div></div>
      <div class="prog-stat"><div class="ps-num" id="ps-streak">0</div><div class="ps-label">Day streak</div></div>
    </div>
    <div class="momentum" id="momentum">⚡ Momentum <span id="mom-val">0</span></div>
  </div>

  <div class="body">
    <div id="continue-slot"></div>
    <div id="journey-slot"></div>

  </div>
  <div class="admin-link"><a href="/admin.html">🌸</a></div>
</div>

  <div class="body">
    <div class="seg">
      <button class="seg-btn active" id="seg-learn" onclick="App.lessonTab('learn')">📖 Learn first</button>
      <button class="seg-btn" id="seg-practice" onclick="App.lessonTab('practice')">✏️ Practice</button>

  </div>
</div>

<!-- ===================== SESSION (mission / practice / reading / flashcards) ===================== -->

  <div class="shead"><button class="sback" onclick="App.exitSession()">✕</button>
    <div class="sbar-wrap"><div class="sbar"><div class="sbar-fill" id="s-fill" style="width:0%"></div></div></div>
    <div class="s-meta" id="s-meta"></div></div>

<div class="view" id="view-results"><div class="body" id="results-body"></div></div>

  <div class="exam-top" id="exam-top"></div>
  <div class="body" id="exam-body"></div>
</div>

<script src="/core.js"></script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}

const C = window.Core;
/* Must match the RESULTS_SECRET env var on the server. This lives in client
   source so it only deters casual abuse — the endpoint only messages YOUR
   Telegram, so the worst case of a leak is spam you can stop by rotating it. */
const RESULTS_SECRET = 'CHANGE_ME_to_match_env';
const DIM_META = {
  vocab:{label:'🧠 Vocabulary',color:'var(--blue)'},
  grammar:{label:'✍ Grammar',color:'var(--green)'},
  reading:{label:'📖 Reading',color:'var(--gold)'},
  listening:{label:'🎧 Listening',color:'var(--purple)'},
  kanji:{label:'🈶 Kanji',color:'var(--red)'}
};
const FOCUS_LABEL = {vocab:'Vocabulary',grammar:'Grammar',reading:'Reading',listening:'Listening',kanji:'Kanji'};

/* ── TTS (free listening) ── */
let jaVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); jaVoice=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang&&v.lang.startsWith('ja'))||null; }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){ if(!('speechSynthesis' in window))return; try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=.9;if(jaVoice)u.voice=jaVoice;speechSynthesis.speak(u);}catch(e){} }
/* Speech registry — buttons reference a short key instead of inlining text,
   so apostrophes / quotes / backslashes in content can never break markup. */
const _sayReg={}; let _sayN=0;
function sayRef(t){ const k='s'+(++_sayN); _sayReg[k]=t||''; return k; }
function sayNow(k){ speak(_sayReg[k]||''); }

/* ── particles & confetti (the juice) ── */
function particle(e,text,color){const p=document.createElement('div');p.className='particle';p.textContent=text;p.style.color=color||'var(--green)';let x=innerWidth/2,y=innerHeight/2;if(e&&e.touches&&e.touches[0]){x=e.touches[0].clientX;y=e.touches[0].clientY}else if(e&&e.clientX){x=e.clientX;y=e.clientY}p.style.left=(x+(Math.random()-.5)*40)+'px';p.style.top=(y-40)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),800)}
function confetti(){C.haptic('celebrate');const cv=document.getElementById('confetti'),ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;const cols=['#ff4b4b','#00c853','#2979ff','#ffb300','#8e24aa'],ps=[];for(let i=0;i<110;i++)ps.push({x:cv.width/2,y:cv.height/2+100,vx:(Math.random()-.5)*20,vy:(Math.random()-1)*20-5,size:Math.random()*10+5,color:cols[i%5],rot:Math.random()*360,rs:(Math.random()-.5)*10});(function d(){ctx.clearRect(0,0,cv.width,cv.height);let on=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.5;p.rot+=p.rs;if(p.y<cv.height)on=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()});if(on)requestAnimationFrame(d);else ctx.clearRect(0,0,cv.width,cv.height)})()}

/* ── Telegram report (fire-and-forget) ── */
function report(type,payload){try{fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,secret:RESULTS_SECRET,name:'Mahym',momentum:C.getMomentum().value,...payload})}).catch(()=>{})}catch(e){}}

/* ============================ APP ============================ */
const App = (function(){
  function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}

  /* ---------- HOME (lesson curriculum) ---------- */
  function diffBadge(d){ const lab={easy:'Easy',medium:'Medium',hard:'Hard'}[d]||'Medium'; return `<span class="diff-badge diff-${d||'medium'}"><span class="diff-dot"></span>${lab}</span>`; }
  function lessonProgressPct(n){ const steps=C.LESSON_STEPS,p=C.getLessonProgress(n); return Math.round((p.steps.filter(s=>steps.includes(s)).length/steps.length)*100); }
  function lessonStepLabel(n){ const done=C.getLessonProgress(n).steps.length,total=C.LESSON_STEPS.length; return done===0?'Start with Learn':done>=total?'Completed ✓':`${done}/${total} steps done`; }
  function lTitle(p,n){ return (p&&(p.topic||p.lessonLabel||p.moduleLabel))||('Lesson '+n); }
  function lSub(p){ if(!p)return ''; return p.topicEn||(p.lessonLabel&&p.lessonLabel!==lTitle(p)?p.lessonLabel:'')||p.level||''; }

  function renderHome(){
    C.snapshotToday();
    updateCountdown();
    const nums=C.lessonNums();
    const done=nums.filter(n=>C.isLessonComplete(n)).length;
    document.getElementById('ps-done').textContent=done+'/26';
    document.getElementById('ps-mastery').textContent=C.overallMastery()+'%';
    document.getElementById('ps-streak').textContent=C.getStreak();
    const mv=C.getMomentum().value;
    document.getElementById('mom-val').textContent=mv;
    document.getElementById('momentum').classList.toggle('hot',mv>=30);

    // continue card → first lesson not yet complete (or the last one if all done)
    const current=nums.find(n=>!C.isLessonComplete(n)) || nums[nums.length-1];
    const cur=current!=null?C.getLessonByNum(current):null;
    document.getElementById('continue-slot').innerHTML = cur ? `
      <div class="continue-card" onclick="C.haptic('heavy');App.openLesson(${current})">
        <div class="cc-eyebrow">${C.isLessonComplete(current)?'Review':'Continue'} · Lesson ${current}</div>
        <div class="cc-title">${lTitle(cur,current)}</div>
        <div class="cc-sub">${lSub(cur)?lSub(cur)+' · ':''}${lessonStepLabel(current)}</div>
      </div>` : '';

    // Practice — ALWAYS available, across all lessons (spaced-repetition review + flashcards)
    const pool=[...C.ITEMS.vocab,...C.ITEMS.grammar,...C.ITEMS.kanji];
    const dueN=pool.filter(it=>C.itemState(it.id).attempts>0 && C.isDue(it.id)).length;
    document.getElementById('review-slot').innerHTML = pool.length ? `
      <div class="sect" style="margin-top:1.1rem">練習 — Practice (all lessons)</div>
      <div class="tile wide" style="background:var(--gold-soft);border-color:#ffe082;margin-bottom:.6rem" onclick="C.haptic('light');App.startGlobalReview()">
        <div class="t-icon">🔁</div><div><div class="t-name" style="color:#b26a00">Review · spaced repetition</div><div class="t-sub">${dueN>0?dueN+' due now · timely review':'Quick timed review — keeps memory fresh'}</div></div>
      </div>
      <div class="tile wide" onclick="C.haptic('light');App.startFlashcards()">
        <div class="t-icon">🃏</div><div><div class="t-name">Flashcards</div><div class="t-sub">${pool.length} cards · recall & self-grade</div></div>
      </div>
      <div class="mock-tile" style="margin-top:.6rem" onclick="C.haptic('heavy');App.openExamHub()">
        <div class="mt-ico">📝</div><div><div class="mt-name">模擬試験 — Mock exam</div><div class="mt-sub">MEXT style · timed · 初級→中級→上級</div></div>
      </div>` : '';

    // JOURNEY MAP — compact tracker for the whole 25→50 path
    renderJourney();
  }

  function renderJourney(){
    const START=25, END=50;
    const have=new Set(C.lessonNums());
    const slot=document.getElementById('journey-slot');

    if(have.size===0){   // nothing synced → keep the reassuring empty-state + diagnostic
      const packs=C.PACKS(), diag = packs.length
        ? `Diagnostic: ${packs.length} pack(s) loaded, but none had a readable lesson number. First label seen: "${(packs[0].lesson||packs[0].module||packs[0].lessonLabel||packs[0].moduleLabel||packs[0].title||'(none)')}".`
        : 'Diagnostic: 0 packs reached this device.';
      slot.innerHTML=`<div class="lesson-about" style="text-align:center">
        <strong>No lessons loaded on this device yet.</strong><br>
        Don't worry — nothing was lost. Your saved progress is safe; the content just hasn't synced here.
        <div style="margin-top:14px"><button class="lcta" onclick="App.reloadContent()">↻ Reload content</button></div>
        <div style="margin-top:12px;font-size:11px;color:var(--ink3);line-height:1.5">${diag}</div></div>`;
      return;
    }

    const sorted=[...have].sort((a,b)=>a-b);
    const current=sorted.find(n=>!C.isLessonComplete(n));   // first unfinished lesson with content
    const jnode=(n)=>{
      if(!have.has(n)) return `<div class="j-node locked" aria-label="Lesson ${n} coming soon">${n}<span class="cor">🔒</span></div>`;
      const p=C.getLessonByNum(n), done=C.isLessonComplete(n), cur=(n===current);
      const dot=({easy:'#2bb673',medium:'#e69500',hard:'#e53935'})[(p&&p.difficulty)||'medium'];
      return `<div class="j-node ${done?'done':cur?'current':''}" onclick="C.haptic('light');App.openLesson(${n})">${n}`
        + (done?'<span class="cor">✓</span>':`<span class="dot" style="background:${dot}"></span>`) + `</div>`;
    };
    // grouped sections so the whole path to 50 scans cleanly
    const sections=[[25,30],[31,40],[41,50]];
    const secHtml=sections.map(([a,b])=>{
      let nodes='',done=0,total=0;
      for(let n=a;n<=b;n++){ if(have.has(n)){ total++; if(C.isLessonComplete(n)) done++; } nodes+=jnode(n); }
      const tag = total>0 ? `${done}/${total}` : 'soon';
      return `<div class="j-sec">
        <div class="j-sec-h"><span>Lessons ${a}–${b}</span><span class="j-sec-c">${tag}</span></div>
        <div class="j-grid">${nodes}</div>
      </div>`;
    }).join('');

    const total=END-START+1;
    const doneCount=sorted.filter(n=>C.isLessonComplete(n)).length;
    const pct=Math.round(doneCount/total*100);
    slot.innerHTML=`
      <div class="sect" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
        <span>私の道 — My Journey</span>
        <a class="j-more" href="/roadmap.html">詳しく見る →</a>
      </div>
      <div class="journey">
        <div class="j-head"><span class="j-now">Lessons 25 → 50</span><span class="j-count">${doneCount} / ${total} done · ${pct}%</span></div>
        <div class="j-bar"><div class="f" style="width:${pct}%"></div></div>
        ${secHtml}
        <div class="j-legend">
          <span><i class="j-chip" style="background:var(--green)"></i>Done</span>
          <span><i class="j-chip" style="background:var(--card);border:2px solid var(--blue)"></i>Now</span>
          <span><i class="j-chip" style="background:var(--card);border:1.5px solid var(--border)"></i>Open</span>
          <span><i class="j-chip" style="background:var(--bg);border:1.5px dashed var(--border)"></i>Soon</span>
        </div>
      </div>`;
  }
  function reloadContent(){ C.haptic('light'); try{C.DB.set('cache_packs',[])}catch(e){} location.reload(); }

  /* ---------- generic quiz runner (mission recall, practice, reading Qs, listening) ---------- */
  let quiz=null;
  function runQuiz(questions,title,onDone){
    quiz={questions,i:0,combo:0,correct:0,onDone,title};
    showView('view-session');
    document.getElementById('s-meta').textContent='';
    renderQ();
  }
  function renderQ(){
    if(quiz.i>=quiz.questions.length){return quiz.onDone(quiz)}
    const q=quiz.questions[quiz.i];
    document.getElementById('s-fill').style.width=(quiz.i/quiz.questions.length*100)+'%';
    document.getElementById('s-meta').textContent=(quiz.i+1)+'/'+quiz.questions.length;
    const isListen=q.type==='listening';
    const diff=C.difficultyOf(q);
    let html=`<div class="q-card" id="qc"><span class="diff-badge diff-${diff} q-diff"><span class="diff-dot"></span>${({easy:'Easy',medium:'Medium',hard:'Hard'})[diff]||'Medium'}</span>`;
    if(isListen){ html+=`<div style="text-align:center;margin-bottom:14px"><button class="listen-btn" onclick="sayNow('${sayRef(q.audioText||'')}')">▶ 聞く Listen</button></div>`; }
    html+=`<div class="q-sentence">${q.s||''}</div><div class="q-ask">${q.a||''}</div><div class="opts">`;
    q.o.forEach((o,idx)=>html+=`<button class="opt" id="o${idx}" onclick="App.answer(event,${idx})">${o}</button>`);
    html+=`</div><div id="fb"></div><button class="next-btn" id="next" onclick="App.nextQ()">Next →</button></div>`;
    document.getElementById('session-body').innerHTML=html;
    if(isListen) setTimeout(()=>speak(q.audioText),350);
  }
  function answer(e,sel){
    const q=quiz.questions[quiz.i];const ok=sel===q.c;
    q.o.forEach((_,idx)=>{const b=document.getElementById('o'+idx);b.disabled=true;if(idx===q.c)b.classList.add('correct');else if(idx===sel)b.classList.add('wrong')});
    // rate the linked item (unified SRS) — quality 4 correct, 1 wrong
    C.rate(q.linksTo||q.id, ok?4:1);
    const fb=document.getElementById('fb');
    if(ok){ C.haptic('success');quiz.correct++;quiz.combo++;
      fb.className='feedback ok';fb.innerHTML='✓ '+(q.exp||'Correct!');
      if(quiz.combo>=3){particle(e,`🔥 ${quiz.combo} combo`,'var(--gold)');if(quiz.combo%3===0)C.haptic('heavy')}else particle(e,'+1','var(--green)');
    } else { C.haptic('error');quiz.combo=0;document.getElementById('qc').classList.add('shake');
      fb.className='feedback err';fb.innerHTML=`✗ Answer: <strong>${q.o[q.c]}</strong>. ${q.exp||''}`; }
    document.getElementById('next').classList.add('show');
  }
  function nextQ(){C.haptic('light');quiz.i++;renderQ()}

  /* ---------- PRODUCTION RECALL runner (recall from memory → reveal → self-grade) ----------
     This is the core retrieval upgrade: instead of picking the answer from 4 options
     (recognition), she must PRODUCE it from memory, then honestly grade how it felt
     (Again/Hard/Good/Easy). That graded signal is exactly what the Memory engine needs,
     and effortful recall builds far more durable memory than recognition. Used for
     vocab / grammar / kanji; reading & listening stay multiple-choice (comprehension). */
  let recall=null;
  function runRecall(cards,title,onDone,opts){
    recall={cards,i:0,good:0,onDone,title,mode:(opts&&opts.mode)||'meaning'};
    showView('view-session');
    document.getElementById('s-meta').textContent='';
    renderRecall();
  }
  function recallMode(it){ return it._mode || recall.mode || 'meaning'; }
  function renderRecall(){
    if(recall.i>=recall.cards.length){return recall.onDone({n:recall.cards.length,good:recall.good})}
    const it=recall.cards[recall.i];
    document.getElementById('s-fill').style.width=(recall.i/recall.cards.length*100)+'%';
    document.getElementById('s-meta').textContent=(recall.i+1)+'/'+recall.cards.length;
    const reading = it.dim==='vocab' && recallMode(it)==='reading';
    const dimName = reading?'Reading':({vocab:'Vocabulary',grammar:'Grammar',kanji:'Kanji'}[it.dim]||'Recall');
    const cueLabel = reading            ? 'Recall the reading (kana)'
                   : it.dim==='grammar' ? "Recall what it means & how it's formed"
                   : it.dim==='kanji'   ? 'Recall the reading & meaning'
                   :                      'Recall the Japanese word';
    const cue = reading ? it.word : it.dim==='grammar' ? it.point : it.dim==='kanji' ? it.char : it.meaning;
    const diff=C.difficultyOf(it);
    document.getElementById('session-body').innerHTML=`
      <div class="recall-eyebrow">🧠 ${dimName} · produce from memory</div>
      <div class="q-card" id="rc"><span class="diff-badge diff-${diff} q-diff"><span class="diff-dot"></span>${({easy:'Easy',medium:'Medium',hard:'Hard'})[diff]||'Medium'}</span>
        <div class="recall-cuelabel">${cueLabel}</div>
        <div class="recall-cue">${cue}</div>
        <div id="recall-answer" class="recall-answer" style="display:none"></div>
        <button class="reveal-btn" id="reveal-btn" onclick="App.revealRecall()">Show answer</button>
        <div id="recall-grade" class="rate-row" style="display:none">
          <button class="rate r1" onclick="App.gradeRecall(1)">Again</button>
          <button class="rate r2" onclick="App.gradeRecall(2)">Hard</button>
          <button class="rate r3" onclick="App.gradeRecall(3)">Good</button>
          <button class="rate r4" onclick="App.gradeRecall(4)">Easy</button>
        </div>
      </div>`;
  }
  function revealRecall(){
    C.haptic('light');
    const it=recall.cards[recall.i];
    const reading = it.dim==='vocab' && recallMode(it)==='reading';
    let html, say;
    if(it.dim==='vocab'){
      say=it.example||it.word;
      html = reading
        ? `<div class="recall-main">${it.reading||''}</div><div class="recall-reading">${it.word} · ${it.meaning||''}</div>
           <div class="recall-ex">${it.example||''}</div><div class="recall-exm">${it.exampleMeaning||''}</div>`
        : `<div class="recall-main">${it.word}</div><div class="recall-reading">${it.reading||''}</div>
           <div class="recall-ex">${it.example||''}</div><div class="recall-exm">${it.exampleMeaning||''}</div>`;
    } else if(it.dim==='kanji'){
      say=it.exampleWord||it.char;
      html=`<div class="recall-main">${it.char}</div><div class="recall-reading">${it.reading||''} · ${it.meaning||''}</div>
        <div class="recall-ex">${it.exampleWord||''}</div>`;
    } else {
      say=it.listening||(it.examples&&it.examples[0])||it.point;
      html=`<div class="fc-grammar-back" style="margin-bottom:10px">${it.explanation||''}</div>
        <ul class="recall-eglist">${(it.examples||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`;
    }
    html+=`<button class="listen-btn" onclick="sayNow('${sayRef(say)}')">▶ 聞く Listen</button>`;
    const a=document.getElementById('recall-answer'); a.innerHTML=html; a.style.display='block';
    document.getElementById('reveal-btn').style.display='none';
    document.getElementById('recall-grade').style.display='grid';
    speak(say);
  }
  function gradeRecall(g){
    C.haptic(g>=3?'success':'error');
    const it=recall.cards[recall.i];
    if(it._drillId) C.rateDrill(it._drillId,g); else C.rate(it.id,g);   // daily-review cards write to the drill SRS
    if(g>=3) recall.good++;
    recall.i++; renderRecall();
  }

  /* ---------- LESSON DETAIL (teach first, then practice) ---------- */
  let curLesson=null, curTab='learn';

  function lessonItems(n,dim){
    const p=C.getLessonByNum(n); if(!p) return [];
    const src = dim==='vocab'?p.vocabulary : dim==='grammar'?p.grammar : dim==='kanji'?p.kanji : [];
    return (src||[]).map(x=>C.BY_ID[x.id]).filter(Boolean);
  }
  function lessonQuestions(n,filter){
    const p=C.getLessonByNum(n); if(!p) return [];
    return C.ITEMS.question.filter(q=>q.module===p.module && (!filter||filter(q)));
  }
  function lessonListening(n){ return lessonQuestions(n,q=>q.type==='listening'); }

  function openLesson(n){
    curLesson=n; curTab='learn';
    const p=C.getLessonByNum(n); if(!p) return;
    renderLessonHead(n);
    document.getElementById('seg-learn').classList.add('active');
    document.getElementById('seg-practice').classList.remove('active');
    showView('view-lesson');
    renderLessonTab();
  }
  function renderLessonHead(n){
    const p=C.getLessonByNum(n);
    const head=document.getElementById('lesson-head');
    head.setAttribute('data-kanji',(p.topic||p.lessonLabel||p.moduleLabel||'学').slice(0,1));
    head.innerHTML=`
      <div class="lh-top"><button class="lh-back" onclick="App.home()">←</button>
        <div class="lh-label">Lesson ${n} · みんなの日本語</div>
        <div style="margin-left:auto">${diffBadge(p.difficulty)}</div></div>
      <div class="lh-topic">${lTitle(p,n)}</div>
      <div class="lh-en">${lSub(p)}</div>
      <div class="lh-steps">${C.LESSON_STEPS.map(s=>`<div class="lh-step${C.getLessonProgress(n).steps.includes(s)?' done':''}"></div>`).join('')}</div>`;
  }
  function lessonTab(t){
    curTab=t; C.haptic('light');
    document.getElementById('seg-learn').classList.toggle('active',t==='learn');
    document.getElementById('seg-practice').classList.toggle('active',t==='practice');
    renderLessonTab();
  }
  function renderLessonTab(){ curTab==='learn'?renderLearn():renderPractice(); scrollTo(0,0); }

  function renderLearn(){
    const n=curLesson, p=C.getLessonByNum(n), g=(p.grammar||[]);
    const about = g.length ? `<div class="lesson-about"><h4>What this lesson teaches</h4>${g.map(x=>`<div style="margin-bottom:8px"><strong>${x.point}</strong><br>${x.explanation||''}</div>`).join('')}</div>` : '';
    const vocabBlock = (p.vocabulary&&p.vocabulary.length) ? `
      <div class="learn-block">
        <div class="lb-h"><span>🧠 Vocabulary · ${p.vocabulary.length}</span>${diffBadge(p.difficulty)}</div>
        ${p.vocabulary.map(v=>`<div class="vocab-row"><div style="flex:1">
            <span class="vocab-jp">${v.word}</span> <span class="vocab-rd">${v.reading||''}</span>
            <div class="vocab-mn">${v.meaning||''}</div>
            ${v.example?`<div class="vocab-ex">${v.example}${v.exampleMeaning?` — <span style="color:var(--ink3)">${v.exampleMeaning}</span>`:''}</div>`:''}
          </div><button class="mini-listen" onclick="sayNow('${sayRef(v.example||v.word)}')">▶</button></div>`).join('')}
      </div>` : '';
    const gramBlock = g.length ? `
      <div class="learn-block">
        <div class="lb-h"><span>✍ Grammar · ${g.length}</span></div>
        ${g.map(x=>`<div class="gram-card">
          <div class="gram-point">${x.point}</div>
          <div class="gram-exp">${x.explanation||''}</div>
          ${(x.examples||[]).map(ex=>`<div class="gram-ex">${ex}</div>`).join('')}
          <button class="listen-btn" onclick="sayNow('${sayRef((x.examples&&x.examples[0])||x.point)}')">▶ 聞く Listen</button>
        </div>`).join('')}
      </div>` : '';
    const kanjiBlock = (p.kanji&&p.kanji.length) ? `
      <div class="learn-block">
        <div class="lb-h"><span>🈶 Kanji · ${p.kanji.length}</span></div>
        ${p.kanji.map(k=>`<div class="vocab-row"><div style="flex:1"><span class="vocab-jp" style="font-size:26px">${k.char}</span> <span class="vocab-rd">${k.reading||''}</span><div class="vocab-mn">${k.meaning||''}</div>${k.exampleWord?`<div class="vocab-ex">${k.exampleWord}</div>`:''}</div><button class="mini-listen" onclick="sayNow('${sayRef(k.exampleWord||k.char)}')">▶</button></div>`).join('')}
      </div>` : '';
    const readingBlock = p.reading ? `
      <div class="learn-block">
        <div class="lb-h"><span>📖 Reading</span></div>
        <div style="font-family:'Noto Sans JP';font-weight:800;margin-bottom:8px">${p.reading.title||''}</div>
        <div class="passage" style="margin:0 0 12px;box-shadow:none">${p.reading.passage||''}</div>
        <button class="listen-btn" onclick="sayNow('${sayRef(p.reading.passage||'')}')">🎧 Read while listening</button>
      </div>` : '';
    document.getElementById('lesson-content').innerHTML=`
      <div class="lookup-hint">💡 Long-press any Japanese below to select it, then tap <strong>Look&nbsp;Up</strong> for the reading &amp; meaning. Tap ▶ to hear it.</div>
      ${about}${vocabBlock}${gramBlock}${kanjiBlock}${readingBlock}
      <button class="lcta" onclick="App.markLearned(${n})">I've studied this — start practising →</button>`;
  }
  function markLearned(n){
    C.haptic('success');
    C.markLessonStep(n,'vocab'); C.markLessonStep(n,'grammar');
    renderLessonHead(n);
    lessonTab('practice');
  }

  function renderPractice(){
    const n=curLesson, p=C.getLessonByNum(n), prog=C.getLessonProgress(n), has=a=>a&&a.length;
    const cats=[];
    if(has(p.vocabulary)) cats.push({icon:'🧠',name:'Vocabulary recall',sub:`${p.vocabulary.length} words · meaning → produce the word`,fn:`App.practiceVocab(${n})`,diff:p.difficulty});
    if(has(p.vocabulary)) cats.push({icon:'🔤',name:'Reading drill',sub:'See the word → say the kana',fn:`App.practiceReadingDrill(${n})`,diff:'easy'});
    if(has(p.grammar))    cats.push({icon:'✍',name:'Grammar',sub:`${p.grammar.length} point${p.grammar.length>1?'s':''} · recall meaning & form`,fn:`App.practiceGrammar(${n})`,diff:p.difficulty});
    if(has(p.kanji))      cats.push({icon:'🈶',name:'Kanji',sub:`${p.kanji.length} character${p.kanji.length>1?'s':''}`,fn:`App.practiceKanji(${n})`,diff:'hard'});
    if(lessonListening(n).length) cats.push({icon:'🎧',name:'Listening',sub:`${lessonListening(n).length} question${lessonListening(n).length>1?'s':''}`,fn:`App.practiceListening(${n})`,diff:'medium'});
    if(p.reading)         cats.push({icon:'📖',name:'Reading comprehension',sub:`${prog.steps.includes('reading')?'✓ done · ':''}Passage + questions`,fn:`App.practiceReading(${n})`,diff:p.difficulty});

    let html=`<div style="font-size:13px;color:var(--ink3);font-weight:700;margin-bottom:10px">Warm up with any drill — each shows its difficulty. Then finish with the two checks below.</div>`;
    html+=cats.map(c=>`<div class="prac-card" onclick="C.haptic('light');${c.fn}">
        <div class="prac-icon">${c.icon}</div>
        <div class="prac-body"><div class="prac-name">${c.name}</div><div class="prac-sub">${c.sub}</div></div>
        ${diffBadge(c.diff)}<div class="prac-arrow">→</div></div>`).join('');
    html+=`<div class="sect" style="margin-top:1.4rem">仕上げ — Finish the lesson</div>`;
    html+=`<button class="lcta${prog.steps.includes('quiz')?' ghost':''}" onclick="C.haptic('heavy');App.practiceMixed(${n})">${prog.steps.includes('quiz')?'✓ ':''}Mixed quiz — recognition check</button>`;
    html+=`<button class="lcta${prog.steps.includes('write')?' ghost':''}" onclick="C.haptic('heavy');App.practiceWrite(${n})">${prog.steps.includes('write')?'✓ ':''}Production check — recall everything</button>`;
    if(C.isLessonComplete(n)) html+=`<div class="lesson-about" style="background:var(--green-soft);border-color:#b9f0cf;text-align:center"><strong>🎉 Lesson ${n} complete.</strong><br>Its cards are now in your daily review rotation, scheduled by memory strength.</div>`;
    document.getElementById('lesson-content').innerHTML=html;
  }

  // ---- practice runners (warm-ups; feed the spaced-repetition engine, no step gate) ----
  function backToLesson(n){ renderLessonHead(n); curTab='practice';
    document.getElementById('seg-learn').classList.remove('active');
    document.getElementById('seg-practice').classList.add('active');
    showView('view-lesson'); renderPractice(); }
  function afterDrill(n,rstat){ C.logActivity((rstat&&rstat.n)||1,1); C.snapshotToday(); C.bumpMomentum(6);
    if(rstat&&rstat.n&&rstat.good>=Math.ceil(rstat.n*0.7)) confetti(); backToLesson(n); }

  function practiceVocab(n){ const c=C.shuffle(lessonItems(n,'vocab')); if(!c.length)return; runRecall(c,'Vocabulary',r=>afterDrill(n,r),{mode:'meaning'}); }
  function practiceReadingDrill(n){ const c=C.shuffle(lessonItems(n,'vocab')); if(!c.length)return; runRecall(c,'Reading',r=>afterDrill(n,r),{mode:'reading'}); }
  function practiceGrammar(n){ const c=C.shuffle(lessonItems(n,'grammar')); if(!c.length)return; runRecall(c,'Grammar',r=>afterDrill(n,r)); }
  function practiceKanji(n){ const c=C.shuffle(lessonItems(n,'kanji')); if(!c.length)return; runRecall(c,'Kanji',r=>afterDrill(n,r)); }

  function practiceListening(n){
    const qs=C.shuffle(lessonListening(n)); if(!qs.length)return;
    runQuiz(qs,'Listening',q=>{ C.logActivity(q.questions.length,2);C.snapshotToday();C.bumpMomentum(6);
      if(q.correct/q.questions.length>=.8)confetti(); backToLesson(n); });
  }
  function practiceReading(n){
    const s=C.getLessonByNum(n).reading; if(!s)return;
    showView('view-session');
    document.getElementById('s-meta').textContent='Read'; document.getElementById('s-fill').style.width='30%';
    document.getElementById('session-body').innerHTML=`
      <div class="lookup-hint">💡 Long-press any word to look it up.</div>
      <div style="font-family:'Noto Sans JP';font-size:18px;font-weight:800;margin-bottom:10px">${s.title||''}</div>
      <div class="passage">${s.passage||''}</div>
      <div class="read-tools"><button class="rt-listen" onclick="sayNow('${sayRef(s.passage||'')}')">🎧 Listen</button><button class="rt-start" onclick="App.lessonReadingQuiz(${n})">Questions →</button></div>`;
  }
  function lessonReadingQuiz(n){
    const s=C.getLessonByNum(n).reading;
    const qs=(s.questions||[]).map(rq=>({id:rq.id,s:rq.q,a:'読解 — comprehension',o:rq.o,c:rq.c,exp:rq.exp,dim:'reading',type:'comprehension',module:'L'+n,lesson:'L'+n}));
    if(!qs.length){ C.markLessonStep(n,'reading'); renderLessonHead(n); return backToLesson(n); }
    runQuiz(qs,'Reading',q=>{ C.markLessonStep(n,'reading'); C.logActivity(q.questions.length,3);C.snapshotToday();C.bumpMomentum(8);
      if(q.correct/q.questions.length>=.8)confetti(); backToLesson(n); });
  }

  // ---- the two graded "checks" that advance the lesson toward completion ----
  function practiceMixed(n){
    let qs=C.shuffle(lessonQuestions(n)).slice(0,8);
    qs=[...qs,...C.getPrevLessonQuestions(n,2)];
    if(!qs.length){ C.markLessonStep(n,'quiz'); renderLessonHead(n); return backToLesson(n); }
    runQuiz(qs,'Quiz',q=>{ C.markLessonStep(n,'quiz'); C.logActivity(q.questions.length,3);C.snapshotToday();const mom=C.bumpMomentum(10);
      report('lesson-quiz',{lesson:n,correct:q.correct,total:q.questions.length,overall:C.overallMastery(),momentum:mom});
      if(q.correct/q.questions.length>=.8)confetti();
      document.getElementById('results-body').innerHTML=resultCard('📝','Quiz done',`${q.correct}/${q.questions.length} correct · Lesson ${n}`,`App.backToLesson(${n})`);
      showView('view-results');
    });
  }
  function practiceWrite(n){
    const cards=C.shuffle([...lessonItems(n,'vocab'),...lessonItems(n,'grammar'),...lessonItems(n,'kanji')]);
    if(!cards.length){ C.markLessonStep(n,'write'); renderLessonHead(n); return backToLesson(n); }
    runRecall(cards,'Production',r=>{ C.markLessonStep(n,'write'); C.logActivity(r.n,3);C.snapshotToday();const mom=C.bumpMomentum(12);
      report('lesson-write',{lesson:n,good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      confetti();
      const complete=C.isLessonComplete(n);
      document.getElementById('results-body').innerHTML=resultCard(complete?'🎉':'✍️',complete?`Lesson ${n} complete!`:'Production done',`${r.good}/${r.n} recalled${complete?' · cards added to your daily review':''}`,`App.backToLesson(${n})`);
      showView('view-results');
    });
  }

  /* ---------- DAILY REVIEW (spaced repetition across completed lessons) ---------- */
  function startReview(){
    const due=C.getDrillDue(20);
    if(!due.length){ return home(); }
    const cards=due.map(dc=>{ const dim = dc.type==='grammar'?'grammar' : dc.type==='kanji'?'kanji' : 'vocab';
      return Object.assign({}, dc.item, { dim, _drillId:dc.id, _mode: dc.type==='vocab-jpen'?'reading':'meaning' }); });
    runRecall(cards,'Daily review',r=>{ C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();const mom=C.bumpMomentum(8);
      report('review',{good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      if(r.good>=Math.ceil(r.n*0.7))confetti();
      document.getElementById('results-body').innerHTML=resultCard('🔁','Review done',`${r.good}/${r.n} solid · Momentum ${mom}`);
      showView('view-results');
    });
  }

  /* ---------- GLOBAL practice (works across ALL lessons, no completion gate) ---------- */
  function allStudyCards(){ return [...C.ITEMS.vocab,...C.ITEMS.grammar,...C.ITEMS.kanji]; }
  function startGlobalReview(){
    curLesson=null;
    const all=allStudyCards();
    if(!all.length) return home();
    const dueAttempted=all.filter(it=>C.itemState(it.id).attempts>0 && C.isDue(it.id));
    const dueNew=all.filter(it=>C.itemState(it.id).attempts===0);
    let cards=[...dueAttempted, ...C.shuffle(dueNew)].slice(0,25);
    if(!cards.length) cards=C.shuffle(all).slice(0,20);   // nothing strictly due → quick mixed session
    runRecall(C.shuffle(cards),'Review',r=>{ C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();const mom=C.bumpMomentum(8);
      if(r.good>=Math.ceil(r.n*0.7))confetti();
      report('review',{good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      document.getElementById('results-body').innerHTML=resultCard('🔁','Review done',`${r.good}/${r.n} solid · Momentum ${mom}`);
      showView('view-results');
    });
  }
  function startFlashcards(){
    curLesson=null;
    const all=allStudyCards();
    if(!all.length) return home();
    const cards=C.shuffle(all).slice(0,20);
    runRecall(cards,'Flashcards',r=>{ C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();C.bumpMomentum(6);
      document.getElementById('results-body').innerHTML=resultCard('🃏','Flashcards done',`${r.good}/${r.n} known · nice work`);
      showView('view-results');
    });
  }
  function exitSession(){C.haptic('light');try{speechSynthesis.cancel()}catch(e){}
    if(curLesson!=null) backToLesson(curLesson); else home(); }
  function home(){curLesson=null;renderHome();showView('view-dash')}

  /* ===================== EXAM COUNTDOWN ===================== */
  const EXAM_DEFAULT_DATE='2027-06-15';   // Ashgabat · mid-June next year (editable by tapping)
  function examDate(){ return C.DB.get('exam_date') || EXAM_DEFAULT_DATE; }
  function examDaysLeft(){
    const d=new Date(examDate()+'T00:00:00'); const now=new Date(); now.setHours(0,0,0,0);
    return Math.ceil((d-now)/86400000);
  }
  function updateCountdown(){
    const el=document.getElementById('exam-countdown'); if(!el) return;
    const n=examDaysLeft();
    const dstr=new Date(examDate()+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    el.innerHTML = n>0
      ? `<span>🎯</span><span class="ec-days">${n}</span><span class="ec-label">days to MEXT exam · Ashgabat · ${dstr}</span>`
      : (n===0 ? `<span>🎯</span><span class="ec-label">MEXT exam is today — good luck!</span>`
               : `<span>🎯</span><span class="ec-label">Set your next exam date</span>`);
  }
  function setExamDate(){
    const cur=examDate();
    const v=prompt('Exam date (YYYY-MM-DD) — MEXT, Ashgabat:', cur);
    if(!v) return;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(v) || isNaN(new Date(v+'T00:00:00').getTime())){ alert('Please use the format YYYY-MM-DD, e.g. 2027-06-15'); return; }
    C.DB.set('exam_date', v); updateCountdown();
  }

  /* ===================== MOCK EXAM (MEXT style, A→B→C) ===================== */
  const LEVELS={
    A:{diff:'easy',  jp:'初級', en:'Elementary',  color:'#2bb673'},
    B:{diff:'medium',jp:'中級', en:'Intermediate',color:'#e69500'},
    C:{diff:'hard',  jp:'上級', en:'Advanced',    color:'#e53935'}
  };
  const EXAM_TIME={A:12*60, B:15*60, C:18*60};   // mini-simulation minutes per level
  const PASS_PCT=60;
  let EX=null, examTimer=null;

  function examStatus(level){ return { best:C.DB.get('exam_best_'+level)||0, passed:!!C.DB.get('exam_pass_'+level) }; }
  function examUnlocked(level){ return level==='A' || (level==='B'&&examStatus('A').passed) || (level==='C'&&examStatus('B').passed); }

  function openExamHub(){
    clearInterval(examTimer); EX=null;
    document.getElementById('exam-top').classList.remove('show');
    const card=(lvl)=>{
      const L=LEVELS[lvl], st=examStatus(lvl), unlocked=examUnlocked(lvl);
      const meta = unlocked
        ? `<div class="lv-best">${st.best?st.best+'%':'—'}</div><div class="lv-status ${st.passed?'lv-pass':''}">${st.passed?'✓ passed':'best score'}</div>`
        : `<div class="lv-status lv-lock">🔒 ${lvl==='B'?'pass A':'pass B'}</div>`;
      return `<button class="level-card lv-${lvl} ${unlocked?'':'locked'}" ${unlocked?`onclick="C.haptic('heavy');App.startExam('${lvl}')"`:'disabled'}>
        <div class="lv-row">
          <div class="lv-badge">${lvl}</div>
          <div><div class="lv-name">${L.jp} · ${L.en}</div><div class="lv-jp">Problem ${lvl} — ${EXAM_TIME[lvl]/60} min · 5 sections</div></div>
          <div class="lv-meta">${meta}</div>
        </div>
        <div class="lv-secs">I 文法 · II 語彙 · III 漢字語彙 · IV 漢字(読み書き) · V 読解</div>
      </button>`;
    };
    document.getElementById('exam-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.home()">← Home</button>
      <div class="exam-hub-head">
        <div class="exam-hub-title">📝 模擬試験 — Mock Exam</div>
        <div class="exam-hub-sub">MEXT-style placement practice. Start at <b>A 初級</b>; pass (≥${PASS_PCT}%) to unlock the next level. Each is timed and split into the real exam's five sections. Questions are drawn from your lessons by difficulty.</div>
      </div>
      ${card('A')}${card('B')}${card('C')}`;
    showView('view-exam');
  }

  function hasKanji(s){ return /[\u4e00-\u9faf]/.test(s||''); }

  function buildExam(level){
    const L=LEVELS[level], diff=L.diff, sh=C.shuffle;
    const qPool=C.ITEMS.question.filter(q=>q.type!=='listening'&&q.type!=='comprehension');
    const pick=(dim,n)=>{ let p=sh(qPool.filter(q=>q.dim===dim&&C.difficultyOf(q)===diff));
      if(p.length<n) p=p.concat(sh(qPool.filter(q=>q.dim===dim&&C.difficultyOf(q)!==diff)));
      return p.slice(0,n); };
    const screens=[]; const sec=[];
    const addSec=(key,label,desc,items,pts,passage,ptitle)=>{
      if(!items.length) return;
      sec.push({key,label,pts:0,poss:0});
      items.forEach((it,idx)=>screens.push({
        section:key, secLabel:label, secDesc:desc, secFirst:idx===0,
        q:it.q, o:it.o, c:it.c, exp:it.exp, pts,
        passage:idx===0?passage:null, passageTitle:idx===0?ptitle:null
      }));
    };
    // I 文法 (grammar MCQ) · II 語彙 (vocab MCQ) · III 漢字語彙 (kanji MCQ)
    addSec('I','文法 Grammar','Choose the most appropriate option for each blank.',
      pick('grammar',6).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),2);
    addSec('II','語彙 Vocabulary','Choose the word that best fits each sentence.',
      pick('vocab',5).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),2);
    addSec('III','漢字語彙 Kanji vocabulary','Choose the correct kanji / reading.',
      pick('kanji',3).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),3);
    // IV 漢字 読み書き — generated reading + writing from vocab with kanji
    const vpref=sh(C.ITEMS.vocab.filter(v=>hasKanji(v.word)&&C.difficultyOf(v)===diff));
    const vall=sh(C.ITEMS.vocab.filter(v=>hasKanji(v.word)));
    const vpool=(vpref.concat(vall.filter(v=>!vpref.includes(v))));
    const readings=sh([...new Set(vall.map(v=>v.reading))]);
    const words=sh([...new Set(vall.map(v=>v.word))]);
    const ivItems=[]; const used=new Set();
    for(const v of vpool){ if(ivItems.length>=3) break; if(used.has(v.id))continue; used.add(v.id);
      const dist=sh(readings.filter(r=>r!==v.reading)).slice(0,3); if(dist.length<3) continue;
      const o=sh([v.reading,...dist]);
      ivItems.push({q:`「${v.word}」の<u>読み方</u>は？`, o, c:o.indexOf(v.reading), exp:`${v.word} = ${v.reading}（${v.meaning}）`}); }
    for(const v of vpool){ if(ivItems.length>=6) break; if(used.has(v.id))continue; used.add(v.id);
      const dist=sh(words.filter(w=>w!==v.word)).slice(0,3); if(dist.length<3) continue;
      const o=sh([v.word,...dist]);
      ivItems.push({q:`「${v.reading}」（${v.meaning}）を<u>漢字</u>で書くと？`, o, c:o.indexOf(v.word), exp:`${v.reading} → ${v.word}`}); }
    addSec('IV','漢字 Kanji (reading & writing)','Read the kanji, and choose the right kanji for each reading.',ivItems,1);
    // V 読解 — a reading passage at this level + its questions
    const packs=C.PACKS().filter(p=>p.reading&&p.reading.questions&&p.reading.questions.length);
    let cand=sh(packs.filter(p=>(p.difficulty||'medium')===diff)); if(!cand.length) cand=sh(packs);
    if(cand.length){ const p=cand[0];
      addSec('V','読解 Reading comprehension','Read the passage, then answer.',
        p.reading.questions.slice(0,3).map(rq=>({q:rq.q,o:rq.o,c:rq.c,exp:rq.exp})),6,
        p.reading.passage, p.reading.title); }
    return {level, screens, sec, time:EXAM_TIME[level]};
  }

  function startExam(level){
    if(!examUnlocked(level)){ alert('Pass the previous level first.'); return; }
    const built=buildExam(level);
    if(built.screens.length<5){ alert('Not enough lesson content for this level yet. Try completing more lessons or pick level A.'); return; }
    EX={ level, screens:built.screens, sec:built.sec, i:0, answers:new Array(built.screens.length).fill(null), left:built.time };
    document.getElementById('exam-top').classList.add('show');
    clearInterval(examTimer); examTimer=setInterval(tickTimer,1000);
    renderExamScreen();
    showView('view-exam');
  }

  function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
  function tickTimer(){
    if(!EX) return; EX.left--;
    const t=document.getElementById('exam-timer');
    if(t){ t.textContent=fmtTime(Math.max(0,EX.left)); t.classList.toggle('warn',EX.left<=60); }
    if(EX.left<=0){ clearInterval(examTimer); finishExam(true); }
  }

  function renderExamScreen(){
    const s=EX.screens[EX.i], n=EX.screens.length;
    document.getElementById('exam-top').innerHTML=`
      <div class="exam-top-row">
        <button class="exam-quit" onclick="App.examQuit()">✕</button>
        <span class="exam-section-pill">Section ${s.section} · ${s.secLabel}</span>
        <span class="exam-timer" id="exam-timer">${fmtTime(EX.left)}</span>
      </div>
      <div class="exam-prog"><div class="f" style="width:${Math.round((EX.i+1)/n*100)}%"></div></div>`;
    let h='';
    if(s.secFirst) h+=`<div class="exam-sec-head">Section ${s.section} · ${s.secLabel}</div><div class="exam-sec-desc">${s.secDesc}</div>`;
    if(s.passage) h+=`<div class="exam-passage"><strong>${s.passageTitle||''}</strong>\n\n${s.passage}</div>`;
    h+=`<div class="exam-q">${(EX.i+1)}. ${s.q}</div><div class="opts">`;
    s.o.forEach((o,idx)=>h+=`<button class="opt${EX.answers[EX.i]===idx?' sel':''}" onclick="App.examPick(${idx})">${o}</button>`);
    h+=`</div><button class="exam-next" id="exam-next" ${EX.answers[EX.i]==null?'disabled':''} onclick="App.examNext()">${EX.i===n-1?'Finish ▸':'Next ▸'}</button>`;
    const body=document.getElementById('exam-body'); body.innerHTML=h; scrollTo(0,0);
  }
  function examPick(i){
    C.haptic('light'); EX.answers[EX.i]=i;
    document.querySelectorAll('#exam-body .opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
    const nx=document.getElementById('exam-next'); if(nx) nx.disabled=false;
  }
  function examNext(){
    if(EX.answers[EX.i]==null) return;
    if(EX.i<EX.screens.length-1){ EX.i++; renderExamScreen(); } else finishExam(false);
  }
  function examQuit(){
    if(!confirm('Quit this exam? Your progress in this attempt will be lost.')) return;
    clearInterval(examTimer); EX=null; openExamHub();
  }

  function finishExam(auto){
    clearInterval(examTimer);
    const secMap={}; EX.sec.forEach(s=>secMap[s.key]={...s});
    let earned=0, poss=0;
    EX.screens.forEach((s,idx)=>{ poss+=s.pts; const sm=secMap[s.section]; sm.poss+=s.pts;
      if(EX.answers[idx]===s.c){ earned+=s.pts; sm.pts+=s.pts; } });
    const pct=poss?Math.round(earned/poss*100):0;
    const passed=pct>=PASS_PCT;
    const lvl=EX.level, prev=C.DB.get('exam_best_'+lvl)||0;
    if(pct>prev) C.DB.set('exam_best_'+lvl,pct);
    if(passed && !C.DB.get('exam_pass_'+lvl)) C.DB.set('exam_pass_'+lvl,true);
    C.bumpMomentum&&C.bumpMomentum(passed?3:1);
    const L=LEVELS[lvl];
    const ring = passed
      ? `<div class="exam-score-ring" style="background:linear-gradient(135deg,var(--green),#2979ff)"><div class="pct">${pct}%</div><div class="lab">PASSED</div></div>`
      : `<div class="exam-score-ring" style="background:linear-gradient(135deg,#e69500,#e53935)"><div class="pct">${pct}%</div><div class="lab">KEEP GOING</div></div>`;
    const nextUnlocked = passed && (lvl==='A'||lvl==='B');
    const breakdown=EX.sec.map(s=>`<div class="exam-brow"><span class="bn">Section ${s.key} · ${s.label}</span><span class="bs">${s.pts}/${s.poss}</span></div>`).join('');
    const wrong=EX.screens.map((s,idx)=>({s,idx})).filter(x=>EX.answers[x.idx]!==x.s.c);
    const review=wrong.length?`<div class="sect" style="margin-top:1.2rem">Review — ${wrong.length} to revisit</div>`+wrong.map(({s,idx})=>`
      <div class="exam-review-q"><div style="font-weight:700;margin-bottom:6px">${s.q}</div>
        <div class="erv-bad">Your answer: ${EX.answers[idx]==null?'—':s.o[EX.answers[idx]]}</div>
        <div class="erv-good">Correct: ${s.o[s.c]}</div>
        ${s.exp?`<div style="color:var(--ink3);margin-top:5px">${s.exp}</div>`:''}</div>`).join(''):
      `<div class="lesson-about" style="text-align:center;margin-top:1rem">Perfect — every answer correct! 🎉</div>`;
    document.getElementById('exam-top').classList.remove('show');
    document.getElementById('exam-body').innerHTML=`
      <div style="text-align:center;margin-top:.5rem">
        <div class="cc-eyebrow" style="color:var(--ink3)">Problem ${lvl} · ${L.jp} ${L.en}${auto?' · time up':''}</div>
        ${ring}
        <div class="exam-verdict">${passed?'合格！ Passed':'がんばって！ Not yet — '+PASS_PCT+'% to pass'}</div>
        <div style="color:var(--ink3);font-size:13px">Score ${earned}/${poss} points${pct>prev?' · new best!':''}</div>
        ${nextUnlocked?`<div style="margin-top:10px;color:var(--green);font-weight:800">🔓 Level ${lvl==='A'?'B 中級':'C 上級'} unlocked!</div>`:''}
      </div>
      <div class="exam-breakdown">${breakdown}</div>
      <div style="display:flex;gap:10px;margin:1rem 0">
        <button class="exam-next" style="background:var(--card);color:var(--ink);border:1.5px solid var(--border);margin:0" onclick="App.startExam('${lvl}')">↻ Retry</button>
        <button class="exam-next" style="margin:0" onclick="App.openExamHub()">Exam menu</button>
      </div>
      ${review}
      <button class="sback" style="margin:1rem 0" onclick="App.home()">← Home</button>`;
    EX=null; scrollTo(0,0);
  }

  return {renderHome,reloadContent,openLesson,lessonTab,markLearned,revealRecall,gradeRecall,answer,nextQ,
          startReview,startGlobalReview,startFlashcards,backToLesson,lessonReadingQuiz,
          practiceVocab,practiceReadingDrill,practiceGrammar,practiceKanji,
          practiceListening,practiceReading,practiceMixed,practiceWrite,
          setExamDate,openExamHub,startExam,examPick,examNext,examQuit,
          exitSession,home};
})();

/* ── INIT ── */
(async function(){
  C.loadContent(()=>App.renderHome());
})();
</script>
</body>
